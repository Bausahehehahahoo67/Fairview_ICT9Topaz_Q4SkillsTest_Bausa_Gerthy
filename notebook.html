<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Skills Test</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            margin: 0;
        }
        .sidebar {
            width: 250px;
            height: 100vh;
            background-color: #34495e;
            position: fixed;
            padding-top: 20px;
        }
        .sidebar h5 {
            color: white;
            padding: 0 20px;
            margin-bottom: 20px;
        }
        .sidebar ul {
            list-style: none;
            padding: 0;
        }
        .sidebar ul li a {
            display: block;
            padding: 12px 20px;
            color: #ecf0f1;
            text-decoration: none;
        }
        .sidebar ul li a:hover {
            background-color: #455a64;
        }
        .logout-btn {
            display: block;
            width: 90%;
            margin: 15px auto;
            padding: 10px;
            background-color: #ff4444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .content {
            margin-left: 250px;
            flex: 1;
            padding: 30px;
        }
        .content h1 {
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .cards-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            width: 280px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .card-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
        }
        .card-teacher {
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #ecf0f1;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        .progress-fill {
            height: 100%;
            background-color: #34495e;
            border-radius: 4px;
        }
        .card-date {
            color: #95a5a6;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h5>Aura Farm</h5>
        <ul>
            <li><a href="notebook.html">Home</a></li>
            <li><a href="#">VN</a></li>
            <li><a href="#">Homework</a></li>
            <li><a href="#">Profile</a></li>
            <li><button class="logout-btn" onclick="logout()">Logout</button></li>
        </ul>
    </div>

    <div class="content">
        <h1>Aura Farm Academy</h1>
        <div class="cards-grid">
            <div class="card">
                <div class="card-title">Filipino</div>
                <div class="card-teacher">Ms. Jemima Francisco</div>
                <div class="progress-bar"><div class="progress-fill" style="width: 70%;"></div></div>
                <div class="card-date">Last updated 2025-2026</div>
            </div>
            <div class="card">
                <div class="card-title">English</div>
                <div class="card-teacher">Ms. Kristin Avila</div>
                <div class="progress-bar"><div class="progress-fill" style="width: 65%;"></div></div>
                <div class="card-date">Last updated 2025-2026</div>
            </div>
            <div class="card">
                <div class="card-title">Math</div>
                <div class="card-teacher">Mr. Jill Ramos</div>
                <div class="progress-bar"><div class="progress-fill" style="width: 80%;"></div></div>
                <div class="card-date">Last updated 2025-2026</div>
            </div>
            <div class="card">
                <div class="card-title">Science</div>
                <div class="card-teacher">Ms. Jillian Talavera</div>
                <div class="progress-bar"><div class="progress-fill" style="width: 75%;"></div></div>
                <div class="card-date">Last updated 2025-2026</div>
            </div>
        </div>
    </div>

    <script>
        function logout() {
            let confirmLogout = confirm("Exit now?"); //confirm() has 2 options : ok (True) and cancel(False)
            if (confirmLogout) { //if ok or True
                window.location.href = "index.html"; //load page
            }
        }
        function message(){
            alert("Not available at this time.");
        }
    </script>
</body>
</html>
