<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork 1</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.deez{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
}

#form-box{
    background: rgba(20, 20, 20, 0.85); 
    padding:30px;
    border-radius:10px;
    border: 1px solid rgba(255,120,0,0.5); 
    box-shadow:0 0 15px rgba(255,100,0,0.6);
    width:300px;
    text-align:center;
}

#form-box input{
    margin-bottom:10px;
}

body{
    background-image: url("https://getwallpapers.com/wallpaper/full/c/0/d/1198873-beautiful-cod-mw3-wallpapers-1920x1080-for-ios.jpg");
    background-size: cover;
}

#message{
    color:white;
    margin-top:10px;
}

.title{
    color: #ffae42;
    font-weight: bold;
}

.form-check-label{
    color: #ffffff;
}

.card{
    background-color: #111;
    color: #ffffff;
    border: 1px solid orange;
}

#form-box .btn-light{
    color: black;
}
</style>

</head>
<body>

<div class="deez">

  <div id="form-box">

    <h4 class="title mb-3">Login to Account</h4>

    <button class="btn btn-light w-100 mb-2" data-bs-toggle="collapse" data-bs-target="#instructions">
      Show Instructions
    </button>

    <div class="collapse mb-3" id="instructions">
        <div class="card card-body">
           <p>Please enter your username and password to log in.</p>
        </div>
    </div>

    <input type="text" class="form-control" id="Username" placeholder="Enter username">
    <input type="password" class="form-control" id="Password" placeholder="Enter password">

    <div class="form-check text-start">
      <input class="form-check-input" type="checkbox" id="checkboxID" onclick="showMessage()">
      <label class="form-check-label">Remember Me</label>
    </div>

    <p id="message"></p>

    <button class="btn btn-info w-100 mt-2" onclick="checkLogin()">Login</button>

  </div>

</div>

<script> //User and Login function
function checkLogin(){
    var username = document.getElementById("Username").value;
    var password = document.getElementById("Password").value;

    if(username === "Aurafarm&willharris" && password === "password"){
        alert("Naka login ka na!");
    } else {
        alert("May mali sa mga impormasyong inilagay mo.");
    }
}

function showMessage() { //True or False portion
    let variable_name = document.getElementById("checkboxID").checked;

    switch(variable_name) {
        case true:
            document.getElementById("message").innerHTML = "";
        break;

        case false:
            document.getElementById("message").innerHTML = "";
        break;
    }
}
</script>

</body>
</html>
